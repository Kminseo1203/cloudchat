<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메신저</title>
<script src="crypto.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefed;--bg4:#e5e5e3;
  --text:#1a1a18;--text2:#6b6b68;--text3:#a8a8a4;
  --blue:#2563eb;--blue2:#1d4ed8;--blue-l:#eff6ff;
  --green:#16a34a;--red:#dc2626;
  --border:rgba(0,0,0,0.08);--r:12px;--r2:8px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--bg2:#1c1c1a;--bg3:#262624;--bg4:#303030;
  --text:#f0f0ee;--text2:#9a9a96;--text3:#5a5a56;
  --blue:#3b82f6;--blue2:#2563eb;--blue-l:#1e3a5f;
  --border:rgba(255,255,255,0.07);
}}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* ── 인증 ── */
#auth{display:flex;align-items:center;justify-content:center;height:100vh}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:28px;width:340px;box-shadow:var(--shadow)}
.card h1{font-size:18px;font-weight:600;text-align:center;margin-bottom:20px}
.tabs{display:flex;background:var(--bg3);border-radius:var(--r2);padding:3px;margin-bottom:20px;gap:3px}
.tab{flex:1;padding:6px;text-align:center;font-size:13px;border-radius:6px;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .15s}
.tab.on{background:var(--bg);color:var(--text);font-weight:500;box-shadow:var(--shadow)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.field input{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg);color:var(--text);font-size:13px;outline:none;transition:border .15s}
.field input:focus{border-color:var(--blue)}
.btn{width:100%;padding:9px;border:none;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:var(--blue2)}
.btn-s{background:var(--bg3);color:var(--text)}.btn-s:hover{background:var(--bg4)}
.err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:16px}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:9px;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-google:hover{background:var(--bg3)}

/* ── 앱 레이아웃 ── */
#app{display:none;height:100vh}
#app.on{display:flex}
.sidebar{width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0}
.sb-top{padding:12px 14px;border-bottom:1px solid var(--border)}
.sb-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sb-title h2{font-size:14px;font-weight:600}
.e2ee-badge{font-size:10px;color:var(--green);display:flex;align-items:center;gap:3px;font-weight:500}
.search{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg);color:var(--text);font-size:12px;outline:none}
.search:focus{border-color:var(--blue)}
.room-list{flex:1;overflow-y:auto}
.room-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.room-item:hover,.room-item.on{background:var(--bg3)}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;background:var(--blue-l);color:var(--blue)}
.ri{flex:1;min-width:0}
.rn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rp{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.badge{background:var(--blue);color:#fff;border-radius:10px;font-size:10px;font-weight:600;padding:1px 6px;flex-shrink:0}
.sb-btns{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:6px}
.ib{flex:1;padding:7px 6px;font-size:12px;border:1px solid var(--border);border-radius:var(--r2);background:transparent;color:var(--text2);cursor:pointer}
.ib:hover{background:var(--bg3);color:var(--text)}

/* ── 채팅 ── */
.chat{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.ch{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2)}
.ch .av{width:30px;height:30px;font-size:10px}
.ch-name{font-size:14px;font-weight:600}
.ch-sub{font-size:11px;color:var(--text3)}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:8px;font-size:13px}
.dsep{text-align:center;font-size:11px;color:var(--text3);margin:4px 0}
.mrow{display:flex;gap:8px;align-items:flex-end}
.mrow.me{flex-direction:row-reverse}
.mav{width:24px;height:24px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;color:var(--text2)}
.mc{max-width:68%}
.msdr{font-size:10px;color:var(--text3);margin-bottom:3px}
.bub{padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.55;background:var(--bg3);color:var(--text);word-break:break-word;white-space:pre-wrap}
.me .bub{background:var(--blue);color:#fff}
.bub.dec{opacity:.5;font-style:italic}
.mtime{font-size:10px;color:var(--text3);margin-top:3px;text-align:right}
.me .mtime{text-align:left}
.typing{padding:6px 14px;font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;min-height:28px}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--text3);display:inline-block;animation:bl 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
.ibar{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:8px;background:var(--bg2)}
.minput{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:18px;background:var(--bg);color:var(--text);font-size:13px;outline:none;resize:none;max-height:120px;line-height:1.4;font-family:inherit}
.minput:focus{border-color:var(--blue)}
.sendbtn{width:34px;height:34px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.sendbtn:hover{background:var(--blue2)}
.attbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text2);transition:background .15s}
.attbtn:hover{background:var(--bg3)}
.noroom{display:flex;align-items:center;justify-content:center;flex:1;color:var(--text3);flex-direction:column;gap:10px;font-size:13px}

/* ── 모달 ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:22px;width:340px;box-shadow:var(--shadow)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.ures{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r2);cursor:pointer;transition:background .1s}
.ures:hover{background:var(--bg2)}
.ures span{font-size:13px}
.mfooter{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.file-bub{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:10px;background:var(--bg3)}
.me .file-bub{background:rgba(255,255,255,.15)}
.ficon{width:26px;height:26px;border-radius:6px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;flex-shrink:0}
</style>
</head>
<body>

<!-- 인증 -->
<div id="auth">
  <div class="card">
    <h1>💬 메신저</h1>
    <div class="tabs">
      <button class="tab on" onclick="tab('login')">로그인</button>
      <button class="tab" onclick="tab('register')">회원가입</button>
    </div>
    <div id="f-login">
      <div class="field"><label>아이디</label><input id="l-id" placeholder="아이디" onkeydown="if(event.key==='Enter')login()"></div>
      <div class="field"><label>비밀번호</label><input id="l-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="btn btn-p" onclick="login()">로그인</button>
    </div>
    <div id="f-reg" style="display:none">
      <div class="field"><label>아이디</label><input id="r-id" placeholder="아이디"></div>
      <div class="field"><label>비밀번호 (8자 이상)</label><input id="r-pw" type="password" placeholder="비밀번호"></div>
      <button class="btn btn-p" onclick="register()">회원가입</button>
    </div>
    <div class="divider">또는</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 로그인
    </button>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="sidebar">
    <div class="sb-top">
      <div class="sb-title">
        <h2 id="myname">메신저</h2>
        <span class="e2ee-badge">🔒 E2EE</span>
      </div>
      <input class="search" placeholder="채팅방 검색..." oninput="filterRooms(this.value)">
    </div>
    <div class="room-list" id="rl"></div>
    <div class="sb-btns">
      <button class="ib" onclick="openDm()">+ DM</button>
      <button class="ib" onclick="openGroup()">+ 그룹</button>
      <button class="ib" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div class="chat" id="chat">
    <div class="noroom"><span style="font-size:32px">💬</span><span>채팅방을 선택하세요</span></div>
  </div>
</div>

<!-- DM 모달 -->
<div class="overlay" id="m-dm">
  <div class="modal">
    <h3>1:1 대화 시작</h3>
    <input class="search" placeholder="아이디 검색..." oninput="searchU(this.value,'dm-res')" style="margin-bottom:10px">
    <div id="dm-res"></div>
    <div class="mfooter"><button class="btn btn-s" style="width:auto;padding:7px 16px" onclick="close_('m-dm')">취소</button></div>
  </div>
</div>

<!-- 그룹 모달 -->
<div class="overlay" id="m-grp">
  <div class="modal">
    <h3>그룹 채팅 만들기</h3>
    <div class="field"><label>방 이름</label><input id="gname" placeholder="그룹 이름"></div>
    <input class="search" placeholder="멤버 검색..." oninput="searchU(this.value,'grp-res')" style="margin-bottom:8px">
    <div id="grp-res"></div>
    <div id="sel-members" style="font-size:11px;color:var(--text2);margin-top:8px;min-height:16px"></div>
    <div class="mfooter">
      <button class="btn btn-s" style="width:auto;padding:7px 16px" onclick="close_('m-grp')">취소</button>
      <button class="btn btn-p" style="width:auto;padding:7px 16px" onclick="createGroup()">만들기</button>
    </div>
  </div>
</div>

<input type="file" id="fi" style="display:none" onchange="sendFile(event)">

<script>
// ── 설정 ──────────────────────────────────────────────────
// TODO: wrangler deploy 후 나오는 Worker URL로 변경
const API = 'https://messenger-worker.YOUR-SUBDOMAIN.workers.dev';

// ── 상태 ──────────────────────────────────────────────────
let token = localStorage.getItem('t');
let me = JSON.parse(localStorage.getItem('me') || 'null');let ws = null;
let rooms = [];
let curRoom = null;
let msgs = {};
let unread = {};
let selMembers = [];
let typingTimer;

// ── 초기화 ────────────────────────────────────────────────
window.onload = async () => { if (token && me) await boot(); };

async function boot() {
  let keys = Crypto.loadKeys();
  if (!keys.publicKeyB64) {
    keys = await Crypto.generateKeyPair();
    Crypto.saveKeys(keys.publicKeyB64, keys.privateKeyB64);
    await api('POST', '/api/auth/publickey', { publicKey: keys.publicKeyB64 });
  }
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').classList.add('on');
  document.getElementById('myname').textContent = me.username;
  connectWS();
  await loadRooms();
}

// ── API ───────────────────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) },
    body: body ? JSON.stringify(body) : undefined
  });
  return r.json();
}

// ── 인증 ──────────────────────────────────────────────────
function tab(t) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('on', i === (t === 'login' ? 0 : 1)));
  document.getElementById('f-login').style.display = t === 'login' ? '' : 'none';
  document.getElementById('f-reg').style.display = t === 'register' ? '' : 'none';
  document.getElementById('err').textContent = '';
}

async function login() {
  const username = document.getElementById('l-id').value.trim();
  const password = document.getElementById('l-pw').value;
  if (!username || !password) return setErr('아이디와 비밀번호를 입력하세요');
  const d = await api('POST', '/api/auth/login', { username, password });
  if (d.error) return setErr(d.error);
  token = d.token; me = d.user;
  localStorage.setItem('t', token); localStorage.setItem('me', JSON.stringify(me));
  await boot();
}

async function register() {
  const username = document.getElementById('r-id').value.trim();
  const password = document.getElementById('r-pw').value;
  if (!username || password.length < 8) return setErr('아이디 입력 & 비밀번호 8자 이상');
  const d = await api('POST', '/api/auth/register', { username, password });
  if (d.error) return setErr(d.error);
  token = d.token; me = d.user;
  localStorage.setItem('t', token); localStorage.setItem('me', JSON.stringify(me));
  await boot();
}

function setErr(m) { document.getElementById('err').textContent = m; }
function logout() { localStorage.clear(); location.reload(); }

// ── Google 로그인 ──────────────────────────────────────────
function loginGoogle() {
  // Worker가 Google OAuth URL로 리다이렉트
  window.location.href = `${API}/api/auth/google`;
}

// 페이지 로드 시 Google 콜백 처리 (?token=xxx)
(function handleGoogleCallback() {
  const params = new URLSearchParams(window.location.search);
  const t = params.get('token');
  const u = params.get('user');
  if (t && u) {
    token = t;
    me = JSON.parse(decodeURIComponent(u));
    localStorage.setItem('t', token);
    localStorage.setItem('me', JSON.stringify(me));
    // URL에서 파라미터 제거
    window.history.replaceState({}, '', window.location.pathname);
    boot();
  }
})();

// ── WebSocket ─────────────────────────────────────────────
function connectWS() {
  const wsUrl = API.replace('https://', 'wss://').replace('http://', 'ws://');
  ws = new WebSocket(`${wsUrl}/ws?token=${token}`);

  ws.onopen = () => console.log('WS 연결됨');
  ws.onclose = () => setTimeout(connectWS, 3000); // 자동 재연결

  ws.onmessage = async (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'message:new') {
      const myPayload = (data.encryptedPayloads || []).find(p => p.userId === me.id);
      let text = '🔒';
      if (myPayload) {
        try { text = await Crypto.decryptMessage(myPayload, Crypto.loadKeys().privateKeyB64); } catch {}
      }
      const msg = { ...data, decryptedText: text, type: data.msgType };
      if (!msgs[data.roomId]) msgs[data.roomId] = [];
      msgs[data.roomId].push(msg);

      if (curRoom && curRoom._id === data.roomId) {
        appendMsg(msg); scrollBottom();
      } else {
        unread[data.roomId] = (unread[data.roomId] || 0) + 1;
        updatePreview(data.roomId, text);
        renderRooms();
      }
    }

    if (data.type === 'typing:start' && data.userId !== me.id) {
      const el = document.getElementById('typing');
      if (el) el.innerHTML = `${esc(data.username)} 입력 중 <span class="dots"><span></span><span></span><span></span></span>`;
    }
    if (data.type === 'typing:stop') {
      const el = document.getElementById('typing');
      if (el) el.innerHTML = '';
    }
  };
}

function wsSend(data) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(data)); }

// ── 채팅방 ────────────────────────────────────────────────
async function loadRooms() {
  const d = await api('GET', '/api/rooms');
  rooms = Array.isArray(d) ? d : [];
  renderRooms();
}

function roomName(r) {
  if (r.type === 'group') return r.name || '그룹 채팅';
  const other = r.members.find(m => m._id !== me.id);
  return other?.username || '알 수 없음';
}

function renderRooms(filter = '') {
  const rl = document.getElementById('rl');
  const filtered = rooms.filter(r => roomName(r).includes(filter));
  if (!filtered.length) { rl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">채팅방 없음</div>'; return; }
  rl.innerHTML = filtered.map(r => {
    const n = roomName(r);
    const on = curRoom && curRoom._id === r._id ? ' on' : '';
    const b = unread[r._id] ? `<span class="badge">${unread[r._id]}</span>` : '';
    return `<div class="room-item${on}" onclick="openRoom('${r._id}')">
      <div class="av">${n.slice(0,2).toUpperCase()}</div>
      <div class="ri">
        <div class="rn">${esc(n)}${r.type==='group'?' 👥':''}</div>
        <div class="rp" id="prev-${r._id}">메시지를 보내보세요</div>
      </div>${b}
    </div>`;
  }).join('');
}

function filterRooms(v) { renderRooms(v); }
function updatePreview(rid, t) { const el = document.getElementById('prev-' + rid); if (el) el.textContent = t.slice(0, 30) + (t.length > 30 ? '…' : ''); }

async function openRoom(rid) {
  curRoom = rooms.find(r => r._id === rid);
  if (!curRoom) return;
  unread[rid] = 0;
  renderRooms();

  const chat = document.getElementById('chat');
  const n = roomName(curRoom);
  chat.innerHTML = `
    <div class="ch">
      <div class="av" style="width:30px;height:30px;font-size:10px">${n.slice(0,2).toUpperCase()}</div>
      <div><div class="ch-name">${esc(n)}</div>
      <div class="ch-sub">${curRoom.type==='group'?`멤버 ${curRoom.members.length}명`:'🔒 E2EE 암호화'}</div></div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="typing" id="typing"></div>
    <div class="ibar">
      <button class="attbtn" onclick="document.getElementById('fi').click()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M13.5 7.5L7.5 13.5C6.1 14.9 4 14.9 2.6 13.5C1.2 12.1 1.2 10 2.6 8.6L8.6 2.6C9.5 1.7 11 1.7 11.9 2.6C12.8 3.5 12.8 5 11.9 5.9L6.3 11.5C5.9 11.9 5.2 11.9 4.8 11.5C4.4 11.1 4.4 10.4 4.8 10L9.8 5"/>
        </svg>
      </button>
      <textarea class="minput" id="minput" placeholder="메시지 입력…" rows="1"
        onkeydown="onKey(event)" oninput="onType()"></textarea>
      <button class="sendbtn" onclick="sendMsg()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 7L2 2L4.5 7L2 12L12 7Z"/>
        </svg>
      </button>
    </div>`;

  if (!msgs[rid]) {
    const data = await api('GET', `/api/rooms/${rid}/messages`);
    const { privateKeyB64 } = Crypto.loadKeys();
    msgs[rid] = await Promise.all((Array.isArray(data) ? data : []).map(async m => {
      let decryptedText = '🔒';
      if (m.payload) { try { decryptedText = await Crypto.decryptMessage(m.payload, privateKeyB64); } catch {} }
      return { ...m, decryptedText };
    }));
  }

  const container = document.getElementById('msgs');
  if (!msgs[rid].length) {
    container.innerHTML = '<div class="empty"><span style="font-size:28px">🔒</span><span>E2EE 암호화 채팅방이에요</span><span style="font-size:12px">메시지를 보내보세요</span></div>';
  } else {
    msgs[rid].forEach(m => appendMsg(m));
  }
  scrollBottom();
}

// ── 메시지 렌더 ───────────────────────────────────────────
function appendMsg(msg) {
  const c = document.getElementById('msgs');
  if (!c) return;
  const isMe = msg.senderId === me.id;
  const time = new Date(msg.createdAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  const initials = (msg.senderName || '?').slice(0, 2).toUpperCase();
  const isGroup = curRoom?.type === 'group';

  let bubble;
  if (msg.type === 'file') {
    bubble = `<div class="file-bub">
      <div class="ficon"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="var(--blue)" stroke-width="1.3"><path d="M2.5 1H8L11 4V12H2.5V1Z"/><path d="M8 1V4H11"/></svg></div>
      <span style="font-size:12px;font-weight:500">${esc(msg.fileName||'파일')}</span>
    </div>`;
  } else {
    const cls = (!msg.decryptedText || msg.decryptedText === '🔒') ? ' dec' : '';
    bubble = `<div class="bub${cls}">${esc(msg.decryptedText || '🔒')}</div>`;
  }

  const el = document.createElement('div');
  el.className = `mrow${isMe ? ' me' : ''}`;
  el.innerHTML = `
    ${!isMe ? `<div class="mav">${initials}</div>` : ''}
    <div class="mc">
      ${!isMe && isGroup ? `<div class="msdr">${esc(msg.senderName)}</div>` : ''}
      ${bubble}
      <div class="mtime">${isMe ? '✓ ' : ''}${time}</div>
    </div>`;
  c.appendChild(el);
}

// ── 전송 ──────────────────────────────────────────────────
async function sendMsg() {
  const inp = document.getElementById('minput');
  if (!inp || !curRoom) return;
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = '';

  const recipients = curRoom.members
    .filter(m => m.publicKey)
    .map(m => ({ userId: m._id, publicKeyB64: m.publicKey }));

  const myKeys = Crypto.loadKeys();
  if (!recipients.find(r => r.userId === me.id) && myKeys.publicKeyB64) {
    recipients.push({ userId: me.id, publicKeyB64: myKeys.publicKeyB64 });
  }

  try {
    const payloads = await Crypto.encryptMessage(text, recipients);
    wsSend({ type: 'message:send', roomId: curRoom._id, encryptedPayloads: payloads, type2: 'text' });
  } catch (e) { console.error('암호화 오류:', e); }
}

async function sendFile(e) {
  const file = e.target.files[0];
  if (!file || !curRoom) return;
  const recipients = curRoom.members.filter(m => m.publicKey).map(m => ({ userId: m._id, publicKeyB64: m.publicKey }));
  try {
    const payloads = await Crypto.encryptMessage(`[파일] ${file.name}`, recipients);
    wsSend({ type: 'message:send', roomId: curRoom._id, encryptedPayloads: payloads, type: 'file', fileName: file.name });
  } catch {}
  e.target.value = '';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  const t = e.target;
  t.style.height = ''; t.style.height = Math.min(t.scrollHeight, 120) + 'px';
}

function onType() {
  wsSend({ type: 'typing:start', roomId: curRoom?._id });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => wsSend({ type: 'typing:stop', roomId: curRoom?._id }), 1500);
}

// ── DM / 그룹 ─────────────────────────────────────────────
function openDm() { document.getElementById('m-dm').classList.add('on'); }
function openGroup() { selMembers = []; document.getElementById('m-grp').classList.add('on'); }
function close_(id) { document.getElementById(id).classList.remove('on'); }

async function searchU(q, targetId) {
  if (!q) { document.getElementById(targetId).innerHTML = ''; return; }
  const data = await api('GET', `/api/users/search?q=${encodeURIComponent(q)}`);
  document.getElementById(targetId).innerHTML = (data || []).map(u =>
    `<div class="ures" onclick="${targetId==='dm-res' ? `startDm('${u._id}','${u.username}')` : `toggleMember('${u._id}','${u.username}')`}">
      <div class="av" style="width:30px;height:30px;font-size:10px">${u.username.slice(0,2).toUpperCase()}</div>
      <span>${esc(u.username)}</span>
      <span id="chk-${u._id}" style="margin-left:auto;color:var(--blue);font-weight:600"></span>
    </div>`
  ).join('') || '<div style="padding:8px;font-size:12px;color:var(--text3)">결과 없음</div>';
}

async function startDm(tid, tname) {
  close_('m-dm');
  const room = await api('POST', '/api/rooms/dm', { targetUserId: tid });
  if (room._id) { if (!rooms.find(r => r._id === room._id)) rooms.unshift(room); renderRooms(); openRoom(room._id); }
}

function toggleMember(id, name) {
  const i = selMembers.findIndex(m => m.id === id);
  if (i >= 0) { selMembers.splice(i, 1); const el = document.getElementById('chk-' + id); if (el) el.textContent = ''; }
  else { selMembers.push({ id, name }); const el = document.getElementById('chk-' + id); if (el) el.textContent = '✓'; }
  document.getElementById('sel-members').textContent = selMembers.length ? '선택: ' + selMembers.map(m => m.name).join(', ') : '';
}

async function createGroup() {
  const name = document.getElementById('gname').value.trim();
  if (!name || !selMembers.length) return alert('이름과 멤버를 선택하세요');
  const room = await api('POST', '/api/rooms/group', { name, memberIds: selMembers.map(m => m.id) });
  close_('m-grp');
  if (room._id) { rooms.unshift(room); renderRooms(); openRoom(room._id); }
}

// ── 유틸 ──────────────────────────────────────────────────
function scrollBottom() { const el = document.getElementById('msgs'); if (el) el.scrollTop = el.scrollHeight; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
